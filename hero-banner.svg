<svg width="1200" height="260" viewBox="0 0 1200 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081A3A"></stop>
      <stop offset="0.5" stop-color="#0A66C2"></stop>
      <stop offset="1" stop-color="#123C7A"></stop>
    </linearGradient>

    <linearGradient id="accent" x1="240" y1="0" x2="960" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7CC7FF"></stop>
      <stop offset="0.5" stop-color="#FFFFFF"></stop>
      <stop offset="1" stop-color="#7CC7FF"></stop>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="260" rx="24" fill="url(#bg)"></rect>

  <circle cx="160" cy="54" r="2.5" fill="#BFE3FF" opacity="0.9"></circle>
  <circle cx="220" cy="92" r="2" fill="#BFE3FF" opacity="0.6"></circle>
  <circle cx="1040" cy="60" r="2.5" fill="#BFE3FF" opacity="0.9"></circle>
  <circle cx="980" cy="102" r="2" fill="#BFE3FF" opacity="0.6"></circle>
  <circle cx="110" cy="180" r="2" fill="#BFE3FF" opacity="0.5"></circle>
  <circle cx="1090" cy="184" r="2" fill="#BFE3FF" opacity="0.5"></circle>

  <path d="M90 205C220 155 360 230 510 190C650 152 790 120 1110 180" stroke="#8FD0FF" stroke-opacity="0.22" stroke-width="2"></path>
  <path d="M130 55C300 98 450 28 660 54C825 74 930 44 1060 72" stroke="#FFFFFF" stroke-opacity="0.12" stroke-width="2"></path>

  <text x="600" y="92" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="38" font-weight="700" fill="white">Ginesh Tandel</text>

  <text x="600" y="136" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="url(#accent)" filter="url(#softGlow)">
    Senior .NET Engineer | Cloud &amp; Microservices Architect
  </text>

  <text x="600" y="176" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="500" fill="#EAF4FF">
    Building scalable, high-performance enterprise systems
  </text>

  <rect x="330" y="198" width="540" height="2" rx="1" fill="url(#accent)" opacity="0.85"></rect>
</svg>